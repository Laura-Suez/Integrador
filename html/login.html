<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Netflix Clone</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />

    <style>
        .btn-primary{
        background-color: black;
        }
    
        #login{
            justify-content: center;
            width: 250px;
            height: 160px;
        }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MiFlix</a>
        </div>
    </nav> 
    
    <!--Ingreso usuario y contraseña-->
    <form action="/index.html" method="get">
     <div id="login" class="container">
      <div class="text-center">
        <label for="username" class="form-label">Usuario</label>
        <input type="text" class="form-control text-center" id="username" name="username" required>
      </div>

      <div class="text-center">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control text-center" id="password" name="password" required>
      </div>
     </div>

      <div class="text-center">
        <button class="btn btn-primary" type="submit">Ingresar</button>
     </div>
    </form>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS propio -->
    <script src="/js/listado.js"></script>
  </body>
</html>
